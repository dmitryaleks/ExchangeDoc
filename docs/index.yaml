# =============================================================================
# Exchange Analysis — Documentation Assembly Index
# =============================================================================
#
# This file is the single source of truth for the order, grouping, and metadata
# of every Markdown file in `docs/`. The HTML site generator (Phase 5) reads
# this file to build the sidebar, breadcrumbs, and per-page metadata.
#
# Schema:
#   version:  integer, increment when the schema itself changes
#   project:  high-level project metadata (rendered into the site header)
#   sections: ordered list of topic groups; each section has ordered entries
#
# Per-entry fields:
#   title          — display title (string, required)
#   file           — path relative to docs/ (string, required, must exist)
#   markets        — list of market codes covered: [KOSPI], [KOSDAQ], or [KOSPI, KOSDAQ]
#   tags           — free-form list of search tags (lowercase, kebab-case)
#   last_reviewed  — ISO date YYYY-MM-DD, or null until first written
#   sources        — list of source-inventory IDs (see docs/sources/INVENTORY.md)
#                    null/empty until Phase 1 populates the inventory
#
# Conventions:
#   - One entry per (topic × market) pair. Shared write-ups live in docs/common/
#     and are referenced with markets: [KOSPI, KOSDAQ].
#   - File paths use forward slashes regardless of host OS.
#   - Keep section and entry order = intended reading order on the site.
#
# =============================================================================

version: 1

